name: CI
on:
  push:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'recursive'
          fetch-depth: '0'
      - name: Set active Xcode path
        run: |
          set -x
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          echo "Required Xcode version: $XCODE_VERSION"
          ls /Applications | grep Xcode || true
          if [ -d "/Applications/Xcode_$XCODE_VERSION.app" ]; then
            sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer
          else
            echo "Exact Xcode_$XCODE_VERSION.app not found on this runner, falling back to default Xcode and using --overrideXcodeVersion later"
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios
      - name: Build the App
        run: |
          set -x
          # source code paths are included in the final binary, so we need to make them stable across builds
          SOURCE_DIR=/Users/Shared/telegram-ios
          # use canonical bazel root
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          cd $SOURCE_DIR
          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV
          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --overrideXcodeVersion \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          echo "=== DIAGNOSTICS: exploring output tree ==="
          echo "--- Is bazel-out a symlink? ---"
          ls -la bazel-out 2>&1 || echo "bazel-out symlink missing"
          echo "--- Top-level contents of bazel-out (resolved) ---"
          find bazel-out -maxdepth 1 2>&1 | head -50
          echo "--- Any folder containing 'applebin' ---"
          find bazel-out -maxdepth 1 -iname "*applebin*" 2>&1
          echo "--- Any file/folder containing 'Telegram' up to depth 6 ---"
          find bazel-out -maxdepth 6 -iname "*Telegram*" 2>&1 | head -100
          echo "--- Any .ipa anywhere under bazel-out ---"
          find bazel-out -iname "*.ipa" 2>&1
          echo "--- Any .app bundle anywhere under bazel-out ---"
          find bazel-out -maxdepth 8 -iname "*.app" -type d 2>&1 | head -50
          echo "--- Any .xcarchive anywhere ---"
          find bazel-out -iname "*.xcarchive" 2>&1
          echo "--- Any .ipa anywhere in the whole source dir (not just bazel-out) ---"
          find . -iname "*.ipa" 2>&1
          echo "=== END DIAGNOSTICS ==="

          # collect ipa (best-effort, won't fail the job if not found this time)
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          IPA_FILE=$(find bazel-out . -type f -iname "*.ipa" 2>/dev/null | head -n 1)
          if [ -n "$IPA_FILE" ]; then
            echo "Found IPA at: $IPA_FILE"
            cp "$IPA_FILE" "$OUTPUT_PATH/"
          else
            echo "No .ipa found this run — see DIAGNOSTICS block above, will fix based on that output."
          fi
      - name: Upload diagnostic artifact list
        run: |
          find /Users/Shared/telegram-ios/bazel-out -maxdepth 6 2>/dev/null > /tmp/bazel-out-tree.txt || echo "no bazel-out" > /tmp/bazel-out-tree.txt
      - name: Upload tree as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazel-out-tree
          path: /tmp/bazel-out-tree.txt
          if-no-files-found: warn